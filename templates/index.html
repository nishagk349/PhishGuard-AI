<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
</head>
<body>
    <h1>Phishing URL Detector</h1>
    <form action="/predict" method="POST">
        <input type="text" name="url" placeholder="Enter URL" required>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <h2>URL: {{ url }}</h2>
        <h2>Result: {{ result }}</h2>
    {% endif %}
</body>
</html>
